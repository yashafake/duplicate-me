name: Bug report
description: Report a reproducible problem in DuplicateMe.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: App version or commit SHA.
      placeholder: "0.1.0 / <commit>"
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 15.0"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste terminal output, stack traces, or screenshots if available.
