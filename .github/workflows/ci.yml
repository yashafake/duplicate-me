name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  swift-tests:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
